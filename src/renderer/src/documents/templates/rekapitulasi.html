<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @page {
        size: Legal portrait;
        margin-top: 1.25cm;
        margin-right: 2.54cm;
        margin-bottom: 2.54cm;
        margin-left: 2.54cm;
      }
      body {
        font-family: 'Bookman Old Style', 'Times New Roman', serif;
        font-size: 11pt;
        line-height: 1;
        color: #000;
        margin: 0;
        padding: 0;
      }
      .lampiran-title {
        text-align: center;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 24pt;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        margin-bottom: 16pt;
        page-break-inside: auto;
      }
      tr {
        page-break-inside: avoid;
        break-inside: avoid;
        page-break-after: auto;
      }
      thead {
        display: table-header-group;
      }
      tfoot {
        display: table-footer-group;
      }
      th,
      td {
        border: 0.5pt solid #000;
        padding: 1mm 1.9mm;
        vertical-align: top;
        word-wrap: break-word;
        word-break: break-word;
        overflow-wrap: anywhere;
      }
      th {
        font-weight: bold;
        text-align: center;
        vertical-align: middle;
      }
      .text-center {
        text-align: center;
      }
      .group-header td {
        font-weight: bold;
        padding-top: 8pt;
        padding-bottom: 8pt;
      }

      /* Fixed column widths */
      .col-no {
        width: 4%;
      }
      .col-media {
        width: 20%;
      }
      .col-pt {
        width: 20%;
      }
      .col-alamat {
        width: auto;
      }
      .col-poin {
        width: 12%;
      }
      .col-ket {
        width: 15%;
      }
    </style>
  </head>
  <body>
    <div class="lampiran-title">LAMPIRAN DAFTAR HASIL VERIFIKASI MEDIA</div>
    <table>
      <thead>
        <tr>
          <th class="col-no">NO</th>
          <th class="col-media">NAMA MEDIA</th>
          <th class="col-pt">NAMA PERUSAHAAN</th>
          <th class="col-alamat">ALAMAT</th>
          <th class="col-poin">KRITERIA POINT</th>
          <th class="col-ket">KET</th>
        </tr>
      </thead>
      <tbody>
        {{tableRows}}
      </tbody>
    </table>
  </body>
</html>
